<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Counter</title>

  <!-- Google Fonts: Courier Prime for the numbers -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* Basic page setup to center the clock */
    :root {
      --cream:        #F9F6F0;
      --sepia:        #C8A882;
      --sepia-dark:   #9E7B58;
      --ink:          #3A2E24;
      --font-type:    'Courier Prime', monospace;
    }

    body {
      background-color: var(--cream);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-type);
    }

    /* Live Counter Layout */
    .hero__counter {
      display: flex; 
      align-items: center; 
      justify-content: center;
      gap: 0.6rem; 
      flex-wrap: wrap;
      opacity: 0; 
      animation: fade-up 1s ease forwards;
    }

    /* Individual Boxes */
    .counter__block {
      display: flex; 
      flex-direction: column; 
      align-items: center;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(200,168,130,0.5);
      border-radius: 10px; 
      padding: 0.6rem 1rem;
      backdrop-filter: blur(4px); 
      min-width: 72px;
    }

    /* Number Styling */
    .counter__value {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700; 
      color: var(--ink); 
      line-height: 1;
    }

    /* Label Styling (days, hours, etc) */
    .counter__label {
      font-size: 0.65rem;
      letter-spacing: 0.1em; 
      color: var(--sepia-dark);
      text-transform: uppercase; 
      margin-top: 0.2rem;
    }

    /* Separator Dots */
    .counter__sep { 
      font-size: 1.2rem; 
      color: var(--sepia); 
      line-height: 1; 
    }

    /* Animation */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Mobile Adjustments */
    @media (max-width: 600px) {
      .hero__counter { gap: 0.35rem; }
      .counter__block { min-width: 58px; padding: 0.5rem 0.7rem; }
      .counter__sep { display: none; }
    }
  </style>
</head>
<body>

  <!-- THE CLOCK HTML -->
  <div class="hero__counter" id="liveCounter">
    <div class="counter__block">
      <span class="counter__value" id="countDays">100</span>
      <span class="counter__label">days</span>
    </div>
    <span class="counter__sep">·</span>
    <div class="counter__block">
      <span class="counter__value" id="countHours">00</span>
      <span class="counter__label">hours</span>
    </div>
    <span class="counter__sep">·</span>
    <div class="counter__block">
      <span class="counter__value" id="countMinutes">00</span>
      <span class="counter__label">mins</span>
    </div>
    <span class="counter__sep">·</span>
    <div class="counter__block">
      <span class="counter__value" id="countSeconds">00</span>
      <span class="counter__label">secs</span>
    </div>
  </div>

  <!-- THE CLOCK JAVASCRIPT -->
  <script>
    // 1. Set your exact start date & time (Vietnam Time)
    const RELATIONSHIP_START = new Date('2026-01-30T00:00:00+07:00');

    // 2. Grab the elements from the HTML
    const elDays    = document.getElementById('countDays');
    const elHours   = document.getElementById('countHours');
    const elMinutes = document.getElementById('countMinutes');
    const elSeconds = document.getElementById('countSeconds');

    // 3. Calculation function
    function updateCounter() {
      const diff = Date.now() - RELATIONSHIP_START.getTime();
      
      // Failsafe if the date is in the future
      if (diff < 0) { 
        if (elDays) elDays.textContent = '0'; 
        return; 
      }
      
      // Math conversions
      const totalSec = Math.floor(diff / 1000);
      const s = totalSec % 60;
      const totalMin = Math.floor(totalSec / 60);
      const m = totalMin % 60;
      const totalHr = Math.floor(totalMin / 60);
      const h = totalHr % 24;
      const d = Math.floor(totalHr / 24);
      
      // Update the HTML text, adding a '0' to the front if under 10 (e.g., '09')
      if (elDays)    elDays.textContent    = d;
      if (elHours)   elHours.textContent   = String(h).padStart(2, '0');
      if (elMinutes) elMinutes.textContent = String(m).padStart(2, '0');
      if (elSeconds) elSeconds.textContent = String(s).padStart(2, '0');
    }

    // 4. Initialize immediately, then refresh every 1000 milliseconds (1 second)
    updateCounter();
    setInterval(updateCounter, 1000);
  </script>

</body>
</html>
