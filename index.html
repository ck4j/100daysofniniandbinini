<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>100 Days — Bin & Nini ✿</title>

  <!-- Google Fonts: Handwritten + Typewriter + Serif -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ────────────────────────────────────────────────────────────────
       1. CUSTOM PROPERTIES (Design Tokens)
       ──────────────────────────────────────────────────────────────── */
    :root {
      --cream:        #F9F6F0;
      --sepia:        #C8A882;
      --sepia-dark:   #9E7B58;
      --ink:          #3A2E24;
      --ink-light:    #6B5744;
      --accent-red:   #B05050;
      --font-hand:    'Caveat', cursive;
      --font-type:    'Courier Prime', monospace;
      --font-serif:   'Playfair Display', Georgia, serif;
      --font-body:    'Lora', Georgia, serif;
    }

    /* ────────────────────────────────────────────────────────────────
       2. RESET & BASE
       ──────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      line-height: 1.7;
      cursor: none;
      overflow: hidden; /* Prevents scrolling since it's only one section */
    }

    /* ────────────────────────────────────────────────────────────────
       3. CUSTOM CURSOR
       ──────────────────────────────────────────────────────────────── */
    .custom-cursor {
      position: fixed; top: 0; left: 0;
      width: 28px; height: 28px;
      pointer-events: none; z-index: 9999;
      font-size: 18px; line-height: 28px; text-align: center;
      color: var(--accent-red); opacity: 0.85;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease, opacity 0.2s;
      user-select: none;
      filter: drop-shadow(0 0 4px rgba(176,80,80,0.4));
    }
    .custom-cursor.clicked { transform: translate(-50%, -50%) scale(1.6); opacity: 1; }

    /* ────────────────────────────────────────────────────────────────
       4. FILM GRAIN & LIGHT LEAK OVERLAYS
       ──────────────────────────────────────────────────────────────── */
    .grain-overlay {
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none; opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      animation: grain-shift 0.4s steps(1) infinite;
    }
    @keyframes grain-shift {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-3px, 2px); }
      50%  { transform: translate(2px, -3px); }
      75%  { transform: translate(-1px, 4px); }
      100% { transform: translate(3px, -1px); }
    }

    .light-leak {
      position: fixed; z-index: 101; pointer-events: none;
      border-radius: 50%; opacity: 0.28;
      animation: leak-pulse 8s ease-in-out infinite alternate;
    }
    .light-leak--tl {
      top: -180px; left: -180px; width: 500px; height: 500px;
      background: radial-gradient(circle, #F5C98A 0%, #E8A56F 30%, transparent 70%);
    }
    .light-leak--br {
      bottom: -200px; right: -200px; width: 600px; height: 600px;
      background: radial-gradient(circle, #D4897A 0%, #B05050 25%, transparent 65%);
      animation-delay: 4s;
    }
    @keyframes leak-pulse {
      0%   { opacity: 0.22; transform: scale(1); }
      100% { opacity: 0.34; transform: scale(1.08); }
    }

    /* ────────────────────────────────────────────────────────────────
       5. HERO SECTION & CLOCK
       ──────────────────────────────────────────────────────────────── */
    .hero {
      position: relative; min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 50% 55%, #F5ECE0 0%, transparent 70%),
        linear-gradient(160deg, #EDE3D6 0%, #DFD4C4 50%, #D0C5B2 100%);
    }
    .hero__vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 90% 90% at 50% 50%,
        transparent 55%, rgba(40, 28, 18, 0.45) 100%);
      pointer-events: none;
    }
    .hero__content {
      position: relative; z-index: 2;
      text-align: center; max-width: 640px;
    }
    .hero__prelude {
      font-family: var(--font-hand); font-size: 1.4rem;
      color: var(--sepia-dark); margin-bottom: 0.5rem;
      opacity: 0; animation: fade-up 1s ease 0.3s forwards;
    }
    .hero__title {
      font-family: var(--font-serif); font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 600; line-height: 1.05; color: var(--ink);
      margin-bottom: 0.4rem;
      opacity: 0; animation: fade-up 1s ease 0.6s forwards;
    }
    .hero__title--accent { display: block; font-style: italic; color: var(--accent-red); }
    .hero__title--name {
      display: block; font-family: var(--font-hand);
      font-size: clamp(3rem, 9vw, 5.5rem); font-weight: 700; color: var(--ink);
    }
    .hero__since {
      font-family: var(--font-type); font-size: 0.82rem;
      letter-spacing: 0.12em; color: var(--ink-light);
      text-transform: uppercase; margin-bottom: 2.5rem;
      opacity: 0; animation: fade-up 1s ease 0.9s forwards;
    }

    /* Live Counter Styling */
    .hero__counter {
      display: flex; align-items: center; justify-content: center;
      gap: 0.6rem; flex-wrap: wrap;
      opacity: 0; animation: fade-up 1s ease 1.2s forwards;
    }
    .counter__block {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(200,168,130,0.5);
      border-radius: 10px; padding: 0.6rem 1rem;
      backdrop-filter: blur(4px); min-width: 72px;
    }
    .counter__value {
      font-family: var(--font-type); font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700; color: var(--ink); line-height: 1;
    }
    .counter__label {
      font-family: var(--font-type); font-size: 0.65rem;
      letter-spacing: 0.1em; color: var(--sepia-dark);
      text-transform: uppercase; margin-top: 0.2rem;
    }
    .counter__sep { font-size: 1.2rem; color: var(--sepia); line-height: 1; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .hero__counter { gap: 0.35rem; }
      .counter__block { min-width: 58px; padding: 0.5rem 0.7rem; }
      .counter__sep { display: none; }
    }
  </style>
</head>

<body>

  <!-- Overlays -->
  <div class="grain-overlay" aria-hidden="true"></div>
  <div class="light-leak light-leak--tl" aria-hidden="true"></div>
  <div class="light-leak light-leak--br" aria-hidden="true"></div>
  <div class="custom-cursor" id="customCursor" aria-hidden="true">♥</div>

  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero__vignette" aria-hidden="true"></div>
    <div class="hero__content">

      <p class="hero__prelude">for my dearest,</p>
      <h1 class="hero__title">
        <span class="hero__title--accent">100 Days,</span>
        <br />
        <span class="hero__title--name">Nini ♥</span>
      </h1>

      <p class="hero__since">since january 30, 2026</p>

      <!-- Live counter -->
      <div class="hero__counter" id="liveCounter">
        <div class="counter__block">
          <span class="counter__value" id="countDays">100</span>
          <span class="counter__label">days</span>
        </div>
        <span class="counter__sep">·</span>
        <div class="counter__block">
          <span class="counter__value" id="countHours">00</span>
          <span class="counter__label">hours</span>
        </div>
        <span class="counter__sep">·</span>
        <div class="counter__block">
          <span class="counter__value" id="countMinutes">00</span>
          <span class="counter__label">mins</span>
        </div>
        <span class="counter__sep">·</span>
        <div class="counter__block">
          <span class="counter__value" id="countSeconds">00</span>
          <span class="counter__label">secs</span>
        </div>
      </div>

    </div>
  </section>

  <script>
    /* ──────────────────────────────────────────────────────────────
       1. CUSTOM CURSOR
       ────────────────────────────────────────────────────────────── */
    const cursor = document.getElementById('customCursor');
    if (cursor) {
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
      });
      document.addEventListener('mousedown', () => cursor.classList.add('clicked'));
      document.addEventListener('mouseup',   () => cursor.classList.remove('clicked'));
      document.addEventListener('mouseleave',() => cursor.style.opacity = '0');
      document.addEventListener('mouseenter',() => cursor.style.opacity = '0.85');
    }

    /* ──────────────────────────────────────────────────────────────
       2. LIVE COUNTER
       ────────────────────────────────────────────────────────────── */
    const RELATIONSHIP_START = new Date('2026-01-30T00:00:00+07:00');

    const elDays    = document.getElementById('countDays');
    const elHours   = document.getElementById('countHours');
    const elMinutes = document.getElementById('countMinutes');
    const elSeconds = document.getElementById('countSeconds');

    function updateCounter() {
      const diff = Date.now() - RELATIONSHIP_START.getTime();
      if (diff < 0) { if (elDays) elDays.textContent = '0'; return; }
      const totalSec = Math.floor(diff / 1000);
      const s = totalSec % 60;
      const totalMin = Math.floor(totalSec / 60);
      const m = totalMin % 60;
      const totalHr = Math.floor(totalMin / 60);
      const h = totalHr % 24;
      const d = Math.floor(totalHr / 24);
      
      if (elDays)    elDays.textContent    = d;
      if (elHours)   elHours.textContent   = String(h).padStart(2, '0');
      if (elMinutes) elMinutes.textContent = String(m).padStart(2, '0');
      if (elSeconds) elSeconds.textContent = String(s).padStart(2, '0');
    }
    updateCounter();
    setInterval(updateCounter, 1000);
  </script>
</body>
</html>
